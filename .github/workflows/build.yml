name: Build OpenCode Android

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Verify musl runtime assets are present
        run: |
          set -e
          echo "Checking jniLibs (execve-able linker + proot loader):"
          for f in libopencode-musl.so libproot-loader.so; do
            path="app/src/main/jniLibs/arm64-v8a/$f"
            if [ ! -f "$path" ]; then
              echo "::error::Missing jniLib: $path"
              exit 1
            fi
            sz=$(stat -c%s "$path")
            if [ "$sz" -lt 10000 ]; then
              echo "::error::$path is suspiciously small ($sz bytes)"
              exit 1
            fi
            echo "OK  $path  ($sz bytes)"
          done
          echo ""
          echo "Checking proot assets (binary + deps):"
          for f in proot/proot proot/lib/libtalloc.so.2 proot/lib/libandroid-shmem.so; do
            path="app/src/main/assets/$f"
            if [ ! -f "$path" ]; then
              echo "::error::Missing proot asset: $path"
              exit 1
            fi
            sz=$(stat -c%s "$path")
            if [ "$sz" -lt 1000 ]; then
              echo "::error::$path is suspiciously small ($sz bytes)"
              exit 1
            fi
            echo "OK  $path  ($sz bytes)"
          done
          echo ""
          echo "Checking Alpine rootfs:"
          path="app/src/main/assets/alpine-rootfs.tar.gz"
          if [ ! -f "$path" ]; then
            echo "::error::Missing Alpine rootfs: $path"
            exit 1
          fi
          sz=$(stat -c%s "$path")
          if [ "$sz" -lt 1000000 ]; then
            echo "::error::$path is suspiciously small ($sz bytes)"
            exit 1
          fi
          echo "OK  $path  ($sz bytes)"
          echo ""
          echo "Checking bundled musl runtime libs:"
          for f in libstdc++.so.6 libgcc_s.so.1; do
            path="app/src/main/assets/musl/$f"
            if [ ! -f "$path" ]; then
              echo "::error::Missing musl runtime asset: $path"
              exit 1
            fi
            sz=$(stat -c%s "$path")
            if [ "$sz" -lt 10000 ]; then
              echo "::error::$path is suspiciously small ($sz bytes)"
              exit 1
            fi
            echo "OK  $path  ($sz bytes)"
          done

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Verify APK contains execve-able musl linker + proot loader
        run: |
          set -e
          APK=app/build/outputs/apk/debug/app-debug.apk
          if [ ! -f "$APK" ]; then
            echo "::error::APK not found at $APK"
            exit 1
          fi
          echo "Inspecting $APK for libopencode-musl.so + libproot-loader.so in lib/arm64-v8a/..."
          for lib in libopencode-musl.so libproot-loader.so; do
            if ! unzip -l "$APK" | grep -q "lib/arm64-v8a/$lib"; then
              echo "::error::$lib is missing from lib/arm64-v8a/ in the APK"
              unzip -l "$APK" | grep -E "lib/|musl|proot" || true
              exit 1
            fi
            echo "OK  $lib present in lib/arm64-v8a/"
          done

          # AAPT must NOT have decompressed alpine-rootfs.tar.gz → alpine-rootfs.tar
          # (controlled by `aaptOptions { noCompress ".gz" }` in build.gradle.kts).
          if unzip -l "$APK" | grep -q "assets/alpine-rootfs.tar.gz"; then
            echo "OK  alpine-rootfs.tar.gz present (preserved by noCompress)"
          elif unzip -l "$APK" | grep -q "assets/alpine-rootfs.tar"; then
            echo "::warning::alpine-rootfs.tar.gz was decompressed to alpine-rootfs.tar by AAPT"
            echo "The Kotlin code falls back to the .tar name, but this wastes ~5 MB of APK space."
            echo "Check that build.gradle.kts has aaptOptions { noCompress '.gz' }."
          else
            echo "::error::Neither alpine-rootfs.tar.gz nor alpine-rootfs.tar is in the APK"
            exit 1
          fi
          echo ""
          echo "APK contents (lib + musl + proot + alpine):"
          unzip -l "$APK" | grep -E "lib/|musl|proot|alpine" | head -30

      - name: Build release APK (unsigned)
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: opencode-android-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload release APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: opencode-android-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 90

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/
            build/reports/
          if-no-files-found: ignore
          retention-days: 7
