name: Build OpenCode Android

on:
  push:
    branches: [ main, master, 'feature/**' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Verify musl runtime assets are present
        run: |
          set -e
          echo "Checking jniLibs (execve-able linker):"
          for f in libopencode-musl.so; do
            path="app/src/main/jniLibs/arm64-v8a/$f"
            if [ ! -f "$path" ]; then
              echo "::error::Missing jniLib: $path"
              exit 1
            fi
            sz=$(stat -c%s "$path")
            if [ "$sz" -lt 100000 ]; then
              echo "::error::$path is suspiciously small ($sz bytes)"
              exit 1
            fi
            echo "OK  $path  ($sz bytes)"
          done
          echo ""
          echo "Checking bundled assets (musl runtime libs):"
          for f in libstdc++.so.6 libgcc_s.so.1; do
            path="app/src/main/assets/musl/$f"
            if [ ! -f "$path" ]; then
              echo "::error::Missing musl runtime asset: $path"
              exit 1
            fi
            sz=$(stat -c%s "$path")
            if [ "$sz" -lt 10000 ]; then
              echo "::error::$path is suspiciously small ($sz bytes)"
              exit 1
            fi
            echo "OK  $path  ($sz bytes)"
          done

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Verify APK contains execve-able musl linker
        run: |
          set -e
          APK=app/build/outputs/apk/debug/app-debug.apk
          if [ ! -f "$APK" ]; then
            echo "::error::APK not found at $APK"
            exit 1
          fi
          echo "Inspecting $APK for libopencode-musl.so in lib/arm64-v8a/..."
          if ! unzip -l "$APK" | grep -q "lib/arm64-v8a/libopencode-musl.so"; then
            echo "::error::libopencode-musl.so is missing from lib/arm64-v8a/ in the APK"
            echo "The package installer would have nothing to extract to nativeLibraryDir."
            echo "Check that app/src/main/jniLibs/arm64-v8a/libopencode-musl.so exists."
            unzip -l "$APK" | grep -E "lib/|musl" || true
            exit 1
          fi
          echo "OK — libopencode-musl.so is in lib/arm64-v8a/, will be extracted by installer."
          echo ""
          echo "APK contents (lib + musl):"
          unzip -l "$APK" | grep -E "lib/|musl"

      - name: Build release APK (unsigned)
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: opencode-android-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload release APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: opencode-android-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 90

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/
            build/reports/
          if-no-files-found: ignore
          retention-days: 7